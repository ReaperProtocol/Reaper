<svg width="720" height="340" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Arial',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0505"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
    <filter id="rglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="340" fill="url(#bg2)"/>

  <!-- ambient red glow -->
  <ellipse cx="360" cy="170" rx="280" ry="130" fill="#ef4444" opacity="0.04" filter="url(#subtleglow)"/>

  <!-- event badge -->
  <rect x="260" y="24" width="200" height="32" rx="16" fill="#7f1d1d"/>
  <text x="360" y="45" fill="#fca5a5" font-size="13" font-weight="700" text-anchor="middle">⚡ LIQUIDATION DETECTED</text>

  <!-- main card -->
  <rect x="60" y="72" width="600" height="208" rx="14" fill="#1f0606" stroke="#7f1d1d" stroke-width="1.5"/>
  <rect x="60" y="72" width="600" height="5" rx="3" fill="#ef4444" filter="url(#rglow)"/>

  <!-- protocol + token line -->
  <text x="360" y="108" fill="#fca5a5" font-size="22" font-weight="700" text-anchor="middle">Kamino · SOL / USDC</text>
  <text x="360" y="130" fill="#7f1d1d" font-size="12" text-anchor="middle">7BxKM…3mQP · 14 seconds ago</text>

  <!-- divider -->
  <rect x="88" y="144" width="544" height="1" fill="#3b0f0f"/>

  <!-- stats: seized / repaid / loss -->
  <text x="180" y="170" fill="#7f1d1d" font-size="11" text-anchor="middle">COLLATERAL SEIZED</text>
  <text x="180" y="194" fill="#f87171" font-size="24" font-weight="700" text-anchor="middle">1,284 SOL</text>

  <rect x="330" y="158" width="1" height="48" fill="#3b0f0f"/>

  <text x="430" y="170" fill="#7f1d1d" font-size="11" text-anchor="middle">DEBT REPAID</text>
  <text x="430" y="194" fill="#e2e8f0" font-size="24" font-weight="700" text-anchor="middle">$128,400</text>

  <rect x="544" y="158" width="1" height="48" fill="#3b0f0f"/>

  <text x="620" y="170" fill="#7f1d1d" font-size="11" text-anchor="middle">BONUS %</text>
  <text x="620" y="194" fill="#f97316" font-size="24" font-weight="700" text-anchor="middle">8.5%</text>

  <!-- divider 2 -->
  <rect x="88" y="216" width="544" height="1" fill="#3b0f0f"/>

  <!-- before / after -->
  <text x="200" y="240" fill="#7f1d1d" font-size="11" text-anchor="middle">HEALTH BEFORE</text>
  <text x="200" y="258" fill="#ef4444" font-size="16" font-weight="700" text-anchor="middle">1.021</text>

  <text x="360" y="252" fill="#7f1d1d" font-size="20" text-anchor="middle">→</text>

  <text x="520" y="240" fill="#7f1d1d" font-size="11" text-anchor="middle">HEALTH AFTER</text>
  <text x="520" y="258" fill="#22c55e" font-size="16" font-weight="700" text-anchor="middle">1.524</text>

  <!-- tx hash -->
  <text x="360" y="274" fill="#4b1b1b" font-size="10" text-anchor="middle">tx: 3xWqZ8…vPmK</text>

  <!-- bottom -->
  <text x="360" y="318" fill="#3b0f0f" font-size="10" text-anchor="middle">reaper · liquidation intelligence · built with claude agent sdk</text>
</svg>
